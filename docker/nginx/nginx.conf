worker_processes auto;
worker_rlimit_nofile 10000;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream web {
        server web:3000;
    }

    upstream srs_http {
        server srs:8080;
    }

    server {
        listen 80;
        server_name live.example.com;

        # FLV playback — bypass CDN, no buffering
        location ~ ^/live/.+\.flv$ {
            proxy_pass http://srs_http;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Cache-Control 'no-cache, no-store, must-revalidate';
            add_header Pragma no-cache;
        }

        # HLS playback
        location ~ ^/live/.+\.(m3u8|ts)$ {
            proxy_pass http://srs_http;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        }

        # OPTIONS preflight
        location ~ ^/live/ {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS';
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Length 0;
                return 204;
            }
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API and frontend
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 80;
        server_name live-push.example.com;

        # RTMP push domain — just a placeholder, actual RTMP goes directly to SRS:1935
        location / {
            return 200 "RTMP push endpoint. Use rtmp://live-push.example.com:1935/live/<stream-key>";
            add_header Content-Type text/plain;
        }
    }
}
